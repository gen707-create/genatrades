name: Update Trading Dashboard

on:
  schedule:
    - cron: '*/30 9-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tradingview-screener yfinance requests pandas

      - name: Run scanners and build dashboard
        env:
          FINVIZ_TOKEN: ${{ secrets.FINVIZ_TOKEN }}
        run: |
          echo "=== Step 1: Minervini scan ==="
          python finviz_scan.py --strategy minervini > /tmp/scan_min.json || echo '{"strategy":"minervini","tickers":[]}' > /tmp/scan_min.json
          echo "scan_min.json: $(wc -c < /tmp/scan_min.json) bytes"
          head -c 200 /tmp/scan_min.json

          echo "=== Step 2: CANSLIM scan ==="
          python finviz_scan.py --strategy canslim > /tmp/scan_can.json || echo '{"strategy":"canslim","tickers":[]}' > /tmp/scan_can.json
          echo "scan_can.json: $(wc -c < /tmp/scan_can.json) bytes"

          echo "=== Step 3: Reversion scan ==="
          python finviz_scan.py --strategy reversion > /tmp/scan_rev.json || echo '{"strategy":"reversion","tickers":[]}' > /tmp/scan_rev.json
          echo "scan_rev.json: $(wc -c < /tmp/scan_rev.json) bytes"

          echo "=== Step 4: Build dashboard ==="
          python tv_enrich.py --tabs --scan /tmp/scan_min.json --scan /tmp/scan_can.json --scan /tmp/scan_rev.json --html --output index.html
          echo "index.html size: $(wc -c < index.html 2>/dev/null || echo MISSING) bytes"
          echo "index.html first line: $(head -1 index.html | head -c 200)"
          echo "date in html: $(grep -o 'June [0-9]\+, [0-9]\+' index.html | head -1)"

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git status
          git add index.html
          git diff --staged --stat
          git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push
