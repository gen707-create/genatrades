name: Update Trading Dashboard

on:
  schedule:
    # Every 30 min, Mon–Fri, 9:00–22:00 UTC (= 5am–6pm ET)
    - cron: '*/30 9-22 * * 1-5'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tradingview-screener yfinance requests pandas

      - name: Run scanner + generate dashboard
        env:
          FINVIZ_TOKEN: ${{ secrets.FINVIZ_TOKEN }}
        run: |
          python finviz_scan.py --strategy minervini \
            | python tv_enrich.py --strategy minervini --html --output index.html

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
