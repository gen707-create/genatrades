name: Update Trading Dashboard

on:
  schedule:
    - cron: '*/30 9-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tradingview-screener yfinance requests pandas

      - name: Run scanners and build dashboard
        env:
          FINVIZ_TOKEN: ${{ secrets.FINVIZ_TOKEN }}
        run: |
          echo "=== Step 1: Minervini scan ==="
          python finviz_scan.py --strategy minervini > /tmp/scan_min.json || echo '{"strategy":"minervini","tickers":[]}' > /tmp/scan_min.json
          echo "scan_min.json: $(wc -c < /tmp/scan_min.json) bytes"
          head -c 200 /tmp/scan_min.json

          echo "=== Step 2: CANSLIM scan ==="
          python finviz_scan.py --strategy canslim > /tmp/scan_can.json || echo '{"strategy":"canslim","tickers":[]}' > /tmp/scan_can.json
          echo "scan_can.json: $(wc -c < /tmp/scan_can.json) bytes"

          echo "=== Step 3: Reversion scan ==="
          python finviz_scan.py --strategy reversion > /tmp/scan_rev.json || echo '{"strategy":"reversion","tickers":[]}' > /tmp/scan_rev.json
          echo "scan_rev.json: $(wc -c < /tmp/scan_rev.json) bytes"

          echo "=== Step 3b: Track new tickers ==="
          python - << 'EOF'
import json, os, sys
from datetime import date

today = date.today().isoformat()
prev_file = 'prev_tickers.json'

# Load history {ticker: first_seen_date}
history = {}
if os.path.exists(prev_file):
    with open(prev_file) as f:
        history = json.load(f)

# Collect all current tickers from all scans
current = set()
for fn in ['/tmp/scan_min.json', '/tmp/scan_can.json', '/tmp/scan_rev.json']:
    try:
        with open(fn) as f:
            data = json.load(f)
        for t in data.get('tickers', []):
            ticker = t['ticker'] if isinstance(t, dict) else str(t)
            if ticker:
                current.add(ticker)
    except Exception as e:
        print(f"Warning reading {fn}: {e}", file=sys.stderr)

# Update history — record first seen date for new tickers
new_today = []
for t in current:
    if t not in history:
        history[t] = today
        new_today.append(t)
    elif history[t] == today:
        new_today.append(t)

# Save updated history
with open(prev_file, 'w') as f:
    json.dump(history, f, indent=2, sort_keys=True)

# Save new tickers list for tv_enrich.py
with open('/tmp/new_tickers.json', 'w') as f:
    json.dump(new_today, f)

print(f"Total tickers: {len(current)}, New today: {len(new_today)}")
if new_today:
    print(f"NEW: {', '.join(sorted(new_today)[:30])}")
EOF

          echo "=== Step 4: Build dashboard ==="
          python tv_enrich.py --tabs --scan /tmp/scan_min.json --scan /tmp/scan_can.json --scan /tmp/scan_rev.json --new-tickers /tmp/new_tickers.json --html --output index.html
          echo "index.html: $(wc -c < index.html 2>/dev/null || echo MISSING) bytes"

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html prev_tickers.json
          git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push
